<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      .wire { stroke:#111; stroke-width:2.2; fill:none; }
      .thin { stroke:#111; stroke-width:1.5; fill:none; }
      .box { stroke:#111; stroke-width:2.2; fill:#fff; }
      .label { font-family:Arial, Helvetica, sans-serif; font-size:20px; fill:#111; }
      .small { font-family:Arial, Helvetica, sans-serif; font-size:15px; fill:#111; }
      .tiny { font-family:Arial, Helvetica, sans-serif; font-size:13px; fill:#111; }
      .title { font-family:Arial, Helvetica, sans-serif; font-size:28px; font-weight:bold; fill:#111; }
      .pin { font-family:Arial, Helvetica, sans-serif; font-size:14px; fill:#111; }
      .rail3 { stroke:#0b62a3; stroke-width:3; fill:none; }
      .rail5 { stroke:#b00020; stroke-width:3; fill:none; }
      .gnd { stroke:#111; stroke-width:2; fill:none; }
      .note { font-family:Arial, Helvetica, sans-serif; font-size:16px; fill:#222; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#ffffff"/>

  <text x="50" y="55" class="title">Normnaher Schaltplan: automatische Zugangsschranke mit Raspberry Pi 4</text>
  <text x="50" y="86" class="note">IR-Transmitter-Testsystem ist bewusst nicht eingezeichnet. GPIO-Nummern sind BCM-Nummern.</text>

  <!-- Supply rails -->
  <line x1="100" y1="140" x2="1500" y2="140" class="rail3"/>
  <text x="105" y="125" class="label" fill="#0b62a3">+3,3 V</text>
  <line x1="100" y1="190" x2="1500" y2="190" class="rail5"/>
  <text x="105" y="175" class="label" fill="#b00020">+5 V</text>
  <line x1="100" y1="1020" x2="1500" y2="1020" class="wire"/>
  <text x="105" y="1005" class="label">GND / gemeinsame Masse</text>

  <!-- Raspberry Pi block -->
  <rect x="600" y="250" width="360" height="560" rx="10" class="box"/>
  <text x="680" y="285" class="label">Raspberry Pi 4</text>
  <text x="665" y="310" class="small">GPIO-Header, BCM-Belegung</text>

  <!-- Pi power pins -->
  <line x1="680" y1="250" x2="680" y2="140" class="wire"/>
  <text x="690" y="235" class="pin">Pin 1 / 3V3</text>
  <line x1="735" y1="250" x2="735" y2="190" class="wire"/>
  <text x="745" y="235" class="pin">Pin 2 / 5V</text>
  <line x1="900" y1="810" x2="900" y2="1020" class="wire"/>
  <text x="810" y="835" class="pin">GND</text>

  <!-- Pi signal pins left side -->
  <circle cx="600" cy="360" r="4" fill="#111"/>
  <text x="410" y="365" class="pin">GPIO2 / SDA / Pin 3</text>
  <line x1="430" y1="360" x2="600" y2="360" class="wire"/>

  <circle cx="600" cy="395" r="4" fill="#111"/>
  <text x="410" y="400" class="pin">GPIO3 / SCL / Pin 5</text>
  <line x1="430" y1="395" x2="600" y2="395" class="wire"/>

  <circle cx="600" cy="460" r="4" fill="#111"/>
  <text x="410" y="465" class="pin">GPIO4 / Pin 7</text>
  <line x1="430" y1="460" x2="600" y2="460" class="wire"/>

  <circle cx="600" cy="560" r="4" fill="#111"/>
  <text x="410" y="565" class="pin">GPIO17 / Pin 11</text>
  <line x1="430" y1="560" x2="600" y2="560" class="wire"/>

  <circle cx="600" cy="610" r="4" fill="#111"/>
  <text x="410" y="615" class="pin">GPIO5 / Pin 29</text>
  <line x1="430" y1="610" x2="600" y2="610" class="wire"/>

  <!-- Pi signal pins right side -->
  <circle cx="960" cy="370" r="4" fill="#111"/>
  <line x1="960" y1="370" x2="1180" y2="370" class="wire"/>
  <text x="980" y="365" class="pin">GPIO18 / Pin 12</text>

  <circle cx="960" cy="470" r="4" fill="#111"/>
  <line x1="960" y1="470" x2="1180" y2="470" class="wire"/>
  <text x="980" y="465" class="pin">GPIO22 / Pin 15</text>

  <circle cx="960" cy="565" r="4" fill="#111"/>
  <line x1="960" y1="565" x2="1090" y2="565" class="wire"/>
  <text x="980" y="560" class="pin">GPIO23 / Pin 16</text>

  <circle cx="960" cy="660" r="4" fill="#111"/>
  <line x1="960" y1="660" x2="1090" y2="660" class="wire"/>
  <text x="980" y="655" class="pin">GPIO24 / Pin 18</text>

  <circle cx="960" cy="755" r="4" fill="#111"/>
  <line x1="960" y1="755" x2="1180" y2="755" class="wire"/>
  <text x="980" y="750" class="pin">GPIO27 / Pin 13</text>

  <!-- LCD block -->
  <rect x="120" y="300" width="250" height="140" rx="8" class="box"/>
  <text x="185" y="330" class="label">LCD 16x2</text>
  <text x="155" y="354" class="small">I²C-PCF8574-Modul</text>
  <line x1="370" y1="360" x2="430" y2="360" class="wire"/>
  <line x1="370" y1="395" x2="430" y2="395" class="wire"/>
  <text x="125" y="383" class="small">SDA</text>
  <text x="125" y="418" class="small">SCL</text>
  <line x1="205" y1="300" x2="205" y2="140" class="wire"/>
  <text x="215" y="285" class="small">VCC an 3V3</text>
  <line x1="245" y1="440" x2="245" y2="1020" class="wire"/>
  <text x="255" y="464" class="small">GND</text>

  <!-- IR receiver -->
  <rect x="120" y="470" width="250" height="110" rx="8" class="box"/>
  <text x="170" y="505" class="label">IR-Empfänger</text>
  <text x="145" y="530" class="small">OUT / VCC / GND</text>
  <line x1="370" y1="525" x2="430" y2="525" class="wire"/>
  <line x1="430" y1="525" x2="430" y2="460" class="wire"/>
  <line x1="180" y1="470" x2="180" y2="140" class="wire"/>
  <line x1="225" y1="580" x2="225" y2="1020" class="wire"/>
  <text x="127" y="558" class="small">OUT → GPIO4</text>

  <!-- HC-SR04 block -->
  <rect x="110" y="640" width="290" height="180" rx="8" class="box"/>
  <text x="195" y="675" class="label">HC-SR04</text>
  <text x="150" y="700" class="small">Ultraschallsensor</text>
  <line x1="185" y1="640" x2="185" y2="190" class="wire"/>
  <text x="195" y="625" class="small">VCC an 5V</text>
  <line x1="225" y1="820" x2="225" y2="1020" class="wire"/>
  <text x="235" y="845" class="small">GND</text>
  <line x1="400" y1="710" x2="430" y2="710" class="wire"/>
  <line x1="430" y1="710" x2="430" y2="560" class="wire"/>
  <text x="125" y="735" class="small">Trig → GPIO17</text>

  <!-- Echo divider -->
  <line x1="400" y1="770" x2="470" y2="770" class="wire"/>
  <text x="125" y="795" class="small">Echo 5V</text>
  <rect x="470" y="755" width="60" height="30" class="box"/>
  <text x="480" y="748" class="tiny">R1 1 kΩ</text>
  <line x1="530" y1="770" x2="545" y2="770" class="wire"/>
  <circle cx="545" cy="770" r="4" fill="#111"/>
  <line x1="545" y1="770" x2="545" y2="610" class="wire"/>
  <line x1="545" y1="610" x2="600" y2="610" class="wire"/>
  <rect x="560" y="800" width="30" height="60" class="box"/>
  <text x="598" y="835" class="tiny">R2 2 kΩ</text>
  <line x1="545" y1="770" x2="575" y2="770" class="wire"/>
  <line x1="575" y1="770" x2="575" y2="800" class="wire"/>
  <line x1="575" y1="860" x2="575" y2="1020" class="wire"/>
  <text x="470" y="600" class="small">Echo geteilt → GPIO5</text>

  <!-- Servo -->
  <rect x="1220" y="305" width="250" height="130" rx="8" class="box"/>
  <text x="1305" y="340" class="label">Servo SG90</text>
  <text x="1260" y="365" class="small">Schrankenarm</text>
  <line x1="1180" y1="370" x2="1220" y2="370" class="wire"/>
  <text x="1230" y="398" class="small">Signal von GPIO18</text>
  <line x1="1320" y1="305" x2="1320" y2="235" class="wire"/>
  <line x1="1320" y1="235" x2="1435" y2="235" class="wire"/>
  <rect x="1435" y="205" width="115" height="60" class="box"/>
  <text x="1450" y="230" class="small">extern</text>
  <text x="1445" y="250" class="small">+5 V</text>
  <line x1="1345" y1="435" x2="1345" y2="1020" class="wire"/>
  <text x="1355" y="460" class="small">Servo-GND an gemeinsame Masse</text>

  <!-- Buzzer -->
  <rect x="1220" y="445" width="180" height="70" rx="8" class="box"/>
  <text x="1270" y="488" class="label">Buzzer</text>
  <line x1="1180" y1="470" x2="1220" y2="470" class="wire"/>
  <line x1="1310" y1="515" x2="1310" y2="1020" class="wire"/>

  <!-- Red LED branch -->
  <rect x="1090" y="550" width="70" height="30" class="box"/>
  <text x="1098" y="542" class="tiny">R3 330Ω</text>
  <line x1="1160" y1="565" x2="1195" y2="565" class="wire"/>
  <polygon points="1195,545 1195,585 1235,565" fill="none" stroke="#111" stroke-width="2"/>
  <line x1="1240" y1="545" x2="1240" y2="585" class="wire"/>
  <line x1="1240" y1="565" x2="1310" y2="565" class="wire"/>
  <line x1="1310" y1="565" x2="1310" y2="1020" class="wire"/>
  <text x="1190" y="530" class="small">LED rot</text>

  <!-- Green LED branch -->
  <rect x="1090" y="645" width="70" height="30" class="box"/>
  <text x="1098" y="637" class="tiny">R4 330Ω</text>
  <line x1="1160" y1="660" x2="1195" y2="660" class="wire"/>
  <polygon points="1195,640 1195,680 1235,660" fill="none" stroke="#111" stroke-width="2"/>
  <line x1="1240" y1="640" x2="1240" y2="680" class="wire"/>
  <line x1="1240" y1="660" x2="1310" y2="660" class="wire"/>
  <line x1="1310" y1="660" x2="1310" y2="1020" class="wire"/>
  <text x="1185" y="625" class="small">LED grün</text>

  <!-- Button -->
  <line x1="1180" y1="755" x2="1240" y2="755" class="wire"/>
  <line x1="1240" y1="735" x2="1240" y2="775" class="wire"/>
  <line x1="1275" y1="735" x2="1275" y2="775" class="wire"/>
  <line x1="1275" y1="755" x2="1335" y2="755" class="wire"/>
  <line x1="1335" y1="755" x2="1335" y2="1020" class="wire"/>
  <text x="1205" y="720" class="small">S1 Taster</text>
  <text x="1190" y="795" class="tiny">GPIO27 gegen GND, interner Pull-up</text>

  <!-- Ground symbols at selected drops -->
  <g transform="translate(900,1020)">
    <line x1="-18" y1="0" x2="18" y2="0" class="gnd"/>
    <line x1="-12" y1="8" x2="12" y2="8" class="gnd"/>
    <line x1="-6" y1="16" x2="6" y2="16" class="gnd"/>
  </g>
  <g transform="translate(245,1020)">
    <line x1="-18" y1="0" x2="18" y2="0" class="gnd"/>
    <line x1="-12" y1="8" x2="12" y2="8" class="gnd"/>
    <line x1="-6" y1="16" x2="6" y2="16" class="gnd"/>
  </g>
  <g transform="translate(1345,1020)">
    <line x1="-18" y1="0" x2="18" y2="0" class="gnd"/>
    <line x1="-12" y1="8" x2="12" y2="8" class="gnd"/>
    <line x1="-6" y1="16" x2="6" y2="16" class="gnd"/>
  </g>

  <!-- Notes -->
  <rect x="1010" y="850" width="500" height="145" rx="8" class="box"/>
  <text x="1030" y="880" class="label">Hinweise</text>
  <text x="1030" y="910" class="note">1. HC-SR04 Echo darf nicht direkt an GPIO5.</text>
  <text x="1030" y="935" class="note">2. R1/R2 bilden den Spannungsteiler 5 V → ca. 3,3 V.</text>
  <text x="1030" y="960" class="note">3. Servo-GND und Raspberry-Pi-GND müssen verbunden sein.</text>
  <text x="1030" y="985" class="note">4. LCD bei 5-V-Betrieb nur mit I²C-Level-Shifter.</text>
</svg>
